name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  archive:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            architecture: arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            architecture: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          test "$GITHUB_REF_NAME" = "v$version"
          test "$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)" = "$version"
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Test
        run: cargo test --locked --all-targets --all-features -- --test-threads=1
      - name: Package
        run: scripts/package-release.sh "${GITHUB_REF_NAME#v}" "${{ matrix.architecture }}" "${{ matrix.target }}" dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opp-${{ matrix.architecture }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: archive
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: opp-*
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: sha256sum opp_*.tar.gz > SHA256SUMS
      - name: Validate release contents
        run: |
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 3
          test "$(wc -l < dist/SHA256SUMS)" -eq 2
          cd dist
          sha256sum --check SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
